<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Supported games</title>
	<style>
		:root {
			--bg: #020204;
			--panel: rgba(10, 10, 14, 0.86);
			--panel2: rgba(18, 18, 24, 0.92);
			--text: #f5f5f7;
			--muted: #9b9ba8;
			--line: rgba(255, 255, 255, 0.12);
			--glow: rgba(255, 255, 255, 0.08);
		}

		* {
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: var(--bg);
			color: var(--text);
			overflow-x: hidden;
		}

		body::before {
			content: "";
			position: fixed;
			inset: -22%;
			z-index: -3;
			background:
				repeating-linear-gradient(62deg, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px 76px),
				repeating-linear-gradient(118deg, rgba(255, 255, 255, 0.13) 0 1px, transparent 1px 76px),
				repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 118px),
				#020204;
			transform: rotate(-2deg) scale(1.08);
			filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.11));
			opacity: 0.82;
			animation: netDrift 34s linear infinite;
		}

		body::after {
			content: "";
			position: fixed;
			inset: -10%;
			z-index: -2;
			background:
				radial-gradient(circle at 18% 22%, rgba(255, 255, 255, 0.16), transparent 18rem),
				radial-gradient(circle at 76% 16%, rgba(255, 255, 255, 0.11), transparent 20rem),
				radial-gradient(circle at 62% 78%, rgba(255, 255, 255, 0.13), transparent 22rem),
				linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.76));
			mix-blend-mode: screen;
			pointer-events: none;
			animation: lightFloat 12s ease-in-out infinite alternate;
		}

		main {
			width: min(1160px, calc(100% - 36px));
			margin: 0 auto;
			padding: 62px 0 86px;
		}

		header {
			display: flex;
			align-items: end;
			justify-content: space-between;
			gap: 18px;
			margin-bottom: 34px;
			animation: fadeUp 600ms ease both;
		}

		h1 {
			font-size: clamp(2.7rem, 7vw, 6.2rem);
			line-height: 0.9;
			letter-spacing: -0.075em;
			margin: 0;
			text-shadow: 0 18px 56px rgba(0, 0, 0, 0.72);
		}

		.stack {
			display: flex;
			flex-direction: column;
			gap: 36px;
		}

		.card {
			position: relative;
			overflow: hidden;
			border: 1px solid var(--line);
			background: linear-gradient(180deg, var(--panel2), var(--panel));
			border-radius: 34px;
			box-shadow: 0 30px 100px rgba(0, 0, 0, 0.52);
			transform: translateY(28px) scale(0.985);
			opacity: 0;
			animation: cardIn 760ms cubic-bezier(.2,.8,.2,1) both;
			transition: transform 260ms ease, border-color 260ms ease, box-shadow 260ms ease;
		}

		.card::before {
			content: "";
			position: absolute;
			inset: 0;
			z-index: 1;
			background:
				repeating-linear-gradient(64deg, rgba(255, 255, 255, 0.075) 0 1px, transparent 1px 56px),
				repeating-linear-gradient(116deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 56px);
			opacity: 0.52;
			mix-blend-mode: screen;
			pointer-events: none;
			animation: cardNet 18s linear infinite;
		}

		.card:hover {
			transform: translateY(-6px) scale(1);
			border-color: rgba(255, 255, 255, 0.26);
			box-shadow: 0 42px 130px rgba(0, 0, 0, 0.72), 0 0 70px var(--glow);
		}

		.coverWrap {
			position: relative;
			overflow: hidden;
			height: clamp(430px, 63vh, 690px);
			background:
				radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.08), transparent 28rem),
				linear-gradient(135deg, #1b1b21, #050506 72%);
		}

		.cover {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			color: transparent;
			font-size: 0;
			filter: grayscale(0.08) saturate(1.02) contrast(1.08) brightness(0.78);
			transform: scale(1.025);
			transition: transform 460ms ease, filter 460ms ease;
		}

		.card:hover .cover {
			transform: scale(1.07);
			filter: grayscale(0) saturate(1.08) contrast(1.1) brightness(0.86);
		}

		.coverShade {
			position: absolute;
			inset: 0;
			z-index: 1;
			background:
				linear-gradient(0deg, rgba(2, 2, 4, 0.94) 0%, rgba(2, 2, 4, 0.58) 35%, transparent 72%),
				linear-gradient(90deg, rgba(2, 2, 4, 0.34), transparent 45%, rgba(2, 2, 4, 0.42));
			pointer-events: none;
		}

		.info {
			position: absolute;
			left: 0;
			right: 0;
			bottom: 0;
			display: grid;
			grid-template-columns: minmax(0, 1fr) auto;
			align-items: end;
			gap: 24px;
			padding: clamp(28px, 5vw, 56px);
			z-index: 3;
		}

		.name {
			font-size: clamp(2rem, 5.4vw, 5.1rem);
			font-weight: 900;
			line-height: 0.95;
			letter-spacing: -0.06em;
			max-width: 900px;
			word-break: normal;
			overflow-wrap: normal;
			text-wrap: balance;
			text-shadow: 0 16px 48px rgba(0, 0, 0, 0.86);
		}

		a.join {
			display: flex;
			justify-content: center;
			align-items: center;
			min-width: 174px;
			height: 56px;
			padding: 0 26px;
			border-radius: 18px;
			background: #f4f4f6;
			color: #050506;
			font-weight: 850;
			text-decoration: none;
			transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
			box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
		}

		a.join:hover {
			background: #ffffff;
			transform: translateY(-2px);
			box-shadow: 0 22px 48px rgba(0, 0, 0, 0.46);
		}

		@media (max-width: 820px) {
			header {
				align-items: start;
				flex-direction: column;
			}

			.coverWrap {
				height: 520px;
			}

			.info {
				grid-template-columns: 1fr;
				align-items: start;
			}

			a.join {
				width: 100%;
			}
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(18px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes cardIn {
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes netDrift {
			from {
				background-position: 0 0, 0 0, 0 0, 0 0;
			}
			to {
				background-position: 120px 68px, -112px 76px, 0 62px, 0 0;
			}
		}

		@keyframes lightFloat {
			0% {
				transform: translate3d(-2%, -1%, 0) scale(1);
				opacity: 0.68;
			}
			50% {
				transform: translate3d(2%, 1.5%, 0) scale(1.04);
				opacity: 0.92;
			}
			100% {
				transform: translate3d(4%, -1%, 0) scale(1.08);
				opacity: 0.72;
			}
		}

		@keyframes cardNet {
			from {
				background-position: 0 0, 0 0;
			}
			to {
				background-position: 90px 60px, -90px 60px;
			}
		}
	</style>
</head>
<body>
	<main>
		<header>
			<h1>Supported games</h1>
		</header>

		<section class="stack" id="games"></section>
	</main>

	<script>
		const games = [
			{
				name: 'FRONTLINES VERSUS',
				image: 'https://tr.rbxcdn.com/180DAY-6051af5b9b7c0d21d2fd8de4c4674072/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/123804558118054/FRONTLINES-VERSUS'
			},
			{
				name: 'FRONTLINES',
				image: 'https://tr.rbxcdn.com/180DAY-e3a209cbd3c9416b523c21cbb799aff9/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/5938036553/FRONTLINES'
			},
			{
				name: 'SkyWars',
				image: 'https://tr.rbxcdn.com/180DAY-9b48d0a3a1e92bf046ac6fba3ffc12ed/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/8542259458/SkyWars'
			},
			{
				name: 'Bridge Duel',
				image: 'https://tr.rbxcdn.com/180DAY-10cd8688d62f1d6ac577c32ec93a5a40/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/139566161526375/Bridge-Duel'
			},
			{
				name: 'Block Tales',
				image: 'https://tr.rbxcdn.com/180DAY-2d904da5c2c45d36933166ad39a706dc/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/16483433878/Block-Tales'
			},
			{
				name: 'Freestyle Football',
				image: 'https://tr.rbxcdn.com/180DAY-c2450cdcd3297de3492d9ca25b554ec4/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/18935841239/Freestyle-Football'
			},
			{
				name: 'Jailbreak',
				image: 'https://tr.rbxcdn.com/180DAY-4bbb0c1ae72c96c49928f322cc54e0a6/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/606849621/Jailbreak'
			},
			{
				name: '1.8 Arena',
				image: 'https://tr.rbxcdn.com/180DAY-b6a0d2791ef99157f1e6f33e5374f3b8/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/77790193039862/1-8-Arena'
			},
			{
				name: 'Flee the Facility',
				image: 'https://tr.rbxcdn.com/180DAY-e2c86d2224da7753fb673da02d961f16/500/280/Image/Jpeg/noFilter',
				join: 'https://www.roblox.com/games/893973440/Flee-the-Facility'
			}
		];

		const container = document.getElementById('games');

		container.innerHTML = games.map((game, index) => `
			<article class="card" style="animation-delay:${index * 90}ms">
				<div class="coverWrap">
					<img class="cover" src="${game.image}" alt="" loading="lazy" onerror="this.remove()">
					<div class="coverShade"></div>
				</div>
				<div class="info">
					<div class="name">${game.name}</div>
					<a class="join" href="${game.join}" target="_blank" rel="noreferrer">Join Game</a>
				</div>
			</article>
		`).join('');
	</script>
</body>
</html>
